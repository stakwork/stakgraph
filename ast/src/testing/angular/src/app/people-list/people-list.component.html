<div>
  <h2>People List</h2>
  <ul>
    <li *ngFor="let person of people">
      {{ person.name }} ({{ person.age }})
<!-- @ast node: Page "people-list.component.html" -->
      <button (click)="deletePerson(person.id)">Delete</button>
    </li>
  </ul>
  <a routerLink="/add-person">Add New Person</a>
</div>
