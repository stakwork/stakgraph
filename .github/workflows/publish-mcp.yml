name: Build and Publish MCP Docker Image

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stage vein into the mcp build context
        # mcp depends on `file:../vein`, which is outside the ./mcp build
        # context. Copy its source in so the Dockerfile can build it in-image.
        run: |
          rm -rf mcp/.vein
          rsync -a \
            --exclude node_modules \
            --exclude web/node_modules \
            --exclude build \
            --exclude web/dist \
            --exclude .git \
            --exclude .env \
            --exclude workspace \
            vein/ mcp/.vein/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp
          platforms: linux/amd64,linux/arm64
          push: true
          # no-cache: true
          tags: |
            ghcr.io/stakwork/stakgraph-mcp:${{ github.ref_name }}
            ghcr.io/stakwork/stakgraph-mcp:latest
