services:
  bifrost:
    # Built by `make docker-build` (see ../gateway/Dockerfile). This image
    # bundles a dynamically-linked bifrost-http + our governance plugin .so
    # at /app/plugins/stakgraph-gateway.so. The upstream maximhq/bifrost
    # image is statically linked and cannot load Go plugins.
    image: stakgraph-gateway:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stakgraph-gateway
    restart: unless-stopped
    environment:
      # Bifrost's listener inside the container is loopback-only; the
      # wrapper owns the public :8181. APP_HOST/APP_PORT are passed
      # through for parity with upstream docs but the wrapper passes
      # -host 127.0.0.1 / -port 8080 as flags which take precedence.
      APP_HOST: 127.0.0.1
      APP_PORT: 8080
      LOG_LEVEL: info
      LOG_STYLE: pretty
      # Bifrost admin credentials. Referenced from data/config.json's
      # auth_config block as env.BIFROST_ADMIN_USER / env.BIFROST_ADMIN_PASS.
      # Bifrost hashes the password (bcrypt) and persists the hash; the
      # env.* reference is kept so a rebuild with a different value
      # picks up the new password on next boot.
      #
      # Dev defaults below match `admin` / `bifrost-dev-password`. In
      # swarm these get auto-generated random values per-instance and
      # passed in from sphinx-swarm; see ../../sphinx-swarm/src/images/bifrost.rs.
      BIFROST_ADMIN_USER: ${BIFROST_ADMIN_USER:-admin}
      BIFROST_ADMIN_PASS: ${BIFROST_ADMIN_PASS:-bifrost-dev-password}
      # Shared secret Hive presents to /_plugin/* routes (Bearer auth).
      # In swarm this is the same value as boltwall.stakwork_secret so
      # Hive already has it; dev default is a recognisable placeholder.
      BIFROST_PROVISIONING_TOKEN: ${BIFROST_PROVISIONING_TOKEN:-dev-provisioning-token}
      # Provider keys are referenced by env.* in data/config.json.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    ports:
      # Host 8181 -> container 8181 (the wrapper's public listener).
      # Matches Hive's DEFAULT_BIFROST_PORT and existing MCP tests
      # (LLM_GATEWAY_URL=http://localhost:8181).
      - "8181:8181"
    volumes:
      # Named volume (NOT bind mount). On macOS Docker Desktop, virtiofs
      # bind mounts silently drop a fraction of SQLite WAL writes, leaving
      # logs.db missing rows that gorm reported as successfully inserted.
      # Named volumes use the Linux VM's native filesystem and avoid this.
      # See plans/bifrost-log-drop-debug.md for the full investigation.
      #
      # config.json is baked into the image (see Dockerfile) and seeded into
      # /app/data on first boot. To re-seed after editing data/config.json:
      #   make docker-build && docker compose down -v && docker compose up -d
      # (Note: -v removes the volume, including logs.db. Omit if you need to
      # preserve historical logs across a config change.)
      - bifrost-data:/app/data

volumes:
  bifrost-data:
    name: stakgraph-gateway-data
