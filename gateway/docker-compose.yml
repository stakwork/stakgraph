services:
  bifrost:
    # Built by `make docker-build` (see ../gateway/Dockerfile). This image
    # bundles a dynamically-linked bifrost-http + our governance plugin .so
    # at /app/plugins/stakgraph-gateway.so. The upstream maximhq/bifrost
    # image is statically linked and cannot load Go plugins.
    image: stakgraph-gateway:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stakgraph-gateway
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      LOG_LEVEL: info
      LOG_STYLE: pretty
      # Provider keys are referenced by env.* in data/config.json.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    ports:
      # Host 8181 -> container 8080, same as mcp/docs/gateway/docker-compose.yml
      # so existing MCP tests (LLM_GATEWAY_URL=http://localhost:8181) just work.
      - "8181:8080"
    volumes:
      # Named volume (NOT bind mount). On macOS Docker Desktop, virtiofs
      # bind mounts silently drop a fraction of SQLite WAL writes, leaving
      # logs.db missing rows that gorm reported as successfully inserted.
      # Named volumes use the Linux VM's native filesystem and avoid this.
      # See plans/bifrost-log-drop-debug.md for the full investigation.
      #
      # config.json is baked into the image (see Dockerfile) and seeded into
      # /app/data on first boot. To re-seed after editing data/config.json:
      #   make docker-build && docker compose down -v && docker compose up -d
      # (Note: -v removes the volume, including logs.db. Omit if you need to
      # preserve historical logs across a config change.)
      - bifrost-data:/app/data

volumes:
  bifrost-data:
    name: stakgraph-gateway-data
