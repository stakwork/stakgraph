name: gitsee-eval-score
# gitsee-specific STRUCTURED scorer: wraps the `gitsee/score-setup` step (NOT the
# generic LLM `eval/score`). Both `actual` and `expected` are a pm2.config.js +
# docker-compose.yml pair (gold = the canonical known-good files), so the gold is
# the ANSWER KEY. The step parses both files and scores by NAME set-diffs vs the
# gold — env-key completeness + compose service/image set, deterministically —
# then folds in a small LLM judge for the semantic residue only.
#
# Why structured (see plans/gitsee-structured-scorer-and-subagents.md): the old
# pure-LLM judge collapsed hive's ~15 env vars into ~1 "env present" item, so a
# missing boot-critical key barely moved the score. Env-key completeness is
# mechanical + boot-critical — a set diff is sharper and lower-variance than
# hoping a paragraph rubric makes the judge enumerate 15 keys.
#
# Input:  { actual, expected, usage?, cost?, booted?, rendered?, bootReason? }
#          (each file = a "FILENAME: …" string; usage/cost = the upstream explorer
#          agent's tokens+$, folded into the total; booted/rendered = the dominant
#          boot gate from gitsee/verify-setup)
# Output: { score, recall, precision, matched, missing, spurious, reason, insight,
#           markdown, usage, cost }
#         (the eval/optimize + eval/reflect contract — preserved by score-setup —
#          plus usage/cost = explorer + judge tokens+$)
steps:
  - id: judge
    type: gitsee/score-setup
    config:
      actual: "{{ input.actual }}"
      expected: "{{ input.expected }}"
      # Upstream (explorer agent) token usage + cost to fold the judge's own
      # tokens+$ into, so the output carries the FULL per-eval cost.
      priorUsage: "{{ input.usage }}"
      priorCost: "{{ input.cost }}"
      # Hybrid by default: deterministic env/service set-diffs dominate, a capped
      # LLM tier judges the semantic residue. Set useLLM:false for a free, instant,
      # zero-variance run (deterministic-only) during heavy optimize sweeps.
      useLLM: "{{ params.useLLM }}"
      # Env keys to ignore in the completeness set-diff (e.g. obvious gold noise).
      # Strict by default ([] → every gold env key is required).
      ignoreEnvKeys: "{{ params.ignoreEnvKeys }}"
      # The semantic-judge rubric (the experiment surface for the LLM tier).
      rubric: "{{ params.rubric }}"
      # DOMINANT BOOT GATE: did the produced setup actually run + render (from
      # gitsee/verify-setup)? !booted → heavy penalty, booted-but-not-rendered →
      # medium. Null/absent (no verify step) leaves the file-shape score untouched.
      booted: "{{ input.booted }}"
      rendered: "{{ input.rendered }}"
      bootReason: "{{ input.bootReason }}"
      # Optionally override the judge model:
      # model: claude-opus-4-20250514

# ── params: the matching policy (the gitsee setup scoring surface) ──────────────
# The deterministic tier needs no rubric (it's pure set-diffs vs the gold). These
# tune the OPTIONAL semantic LLM tier + the env-completeness policy.
params:
  # Hybrid on by default (deterministic-dominant). Flip to false for pure
  # deterministic scoring (no LLM cost/variance) in the optimize hot loop.
  useLLM: true
  # Strict env completeness: treat EVERY gold env key as required. Add keys here
  # to exempt known non-essential / noise keys from the recall set-diff.
  ignoreEnvKeys: []
  # Rubric for the SEMANTIC residue ONLY — the env-key set and the service set are
  # already scored deterministically, so the judge must NOT re-penalize them.
  rubric: |-
    Judge ONLY the SEMANTIC (non-mechanical) quality of the PRODUCED repo setup
    against the GOLD (canonical known-good) pair. BOTH are a pm2.config.js +
    docker-compose.yml pair. The env-var KEY SET and the compose SERVICE SET are
    scored separately and deterministically — DO NOT re-penalize a missing/extra
    env key or service here; assume those are handled.

    Score FUNCTIONAL EQUIVALENCE, not textual fidelity. Focus exclusively on:

    - START COMMAND: does each pm2 app's `script` actually launch the repo's real
      server / entrypoint? Reward EQUIVALENCE, not mimicry. Treat these as the
      SAME (never a defect): "npm start" ≈ "node server.js" ≈ "node index.js" when
      that's what the start script runs; `npm run dev` ≈ `next dev` ≈ `npx next dev`;
      and a pm2 `script: "npx" , args: "-y foo"` split is IDENTICAL to a combined
      `script: "npx -y foo"`. Only flag a start command that launches the WRONG
      thing (a different app, or a non-runnable target), not a different spelling.
    - HOST-BINDING FLAG: present when the framework needs one to be reachable in
      the pod (Next.js, Vite), and NOT forced on a plain server that already binds
      0.0.0.0. The flag SPELLINGS are interchangeable — never penalize one variant
      vs another: for Next.js `-H 0.0.0.0` and `--hostname 0.0.0.0` are the SAME
      flag (aliases); for Vite `--host 0.0.0.0` and `--host` are equivalent. Only
      flag host-binding if it is genuinely ABSENT when required.
    - FRONTEND / REPO CHOICE: which repo (or which app within a repo) is chosen as
      the runnable "frontend" does NOT matter — judge the chosen app on its OWN
      merits, never penalize it for differing from the gold's repo/app choice. For
      a DUMMY placeholder frontend (e.g. `hell0-w0rld`, used when there's no real
      web app), the `cwd` / which repo it points at is ARBITRARY — never flag it.
    - CROSS-FILE CRED CONSISTENCY: the DB/connection credentials embedded in the
      pm2 env (e.g. a DATABASE_URL) are consistent with the corresponding compose
      service (same db name / user / password / host:port) — regardless of how
      either side is named.
    - SERVICE APPROPRIATENESS: do NOT flag EXTRA services as a defect — if the app
      boots and renders, an extra backing service (e.g. a redis the gold mocks) did
      no harm and is acceptable. Only flag a MISSING service the app genuinely
      needs to boot. (Over-provisioning is no longer penalized.)
    - MOCK/OFFLINE MODE: when the repo supports a mock/offline mode (USE_MOCKS or
      similar), the produced pm2 env should enable it and use placeholder mock-*
      creds for external services rather than provisioning them.
    - PUBLIC URL via $POD_URL / $POD_ID: public-facing / externally-reachable URL
      env vars (auth callback/base URLs like NEXTAUTH_URL, NEXT_PUBLIC_*_URL,
      FRONTEND_URL, OAuth/webhook/success-cancel URLs) are pod-based, NOT localhost:
      `$POD_URL` (the full base URL https://$POD_ID.<domain>) for this app's
      default port, or `https://$POD_ID-<port>.<domain>` for a specific port (a
      sibling app/service). Internal connection strings (DATABASE_URL to the
      compose db, in-pod localhost services) may stay localhost — don't flag those.
      Reward functional equivalence ($POD_URL vs the equivalent https://$POD_ID.<domain>
      are the same thing).

    COSMETIC differences are ALWAYS fine (never an issue): script FORM / flag
    spelling when it launches the same entrypoint (incl. -H vs --hostname,
    script-vs-args splits, npx vs direct binary), the specific dev PORT number, the
    chosen cwd/repo (esp. for a dummy frontend), image tag variants, the compose
    `version:` key, volume names, literal dev-secret values, max_memory_restart and
    other pm2 cosmetics.

    `semanticScore` = 1 when all of the above are satisfied; lower it only for real
    semantic defects, and list each concrete defect in `issues`.
