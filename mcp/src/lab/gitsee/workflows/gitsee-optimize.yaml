name: gitsee-optimize
# Self-improving loop (EVAL_SPEC §7/§11.4) for the gitsee EXPLORATION prompt,
# MULTI-REPO: each generation evals the candidate `system` prompt over the whole
# `dataset` (via gitsee-eval, once per repo), AVERAGES the scores, and reflects a
# better prompt (via gitsee-eval-reflect) from the aggregated per-repo results —
# keeping the best mean. Averaging across repos is the overfitting fix. Each
# generation injects the candidate into gitsee-explore-services via
# paramOverrides (applied to every repo's eval run).
#
# We tune `system` (the explorer persona), NOT `finalAnswer` — finalAnswer holds
# the hard pod contract ("frontend" naming, local-only
# policy) which we don't want the optimizer rewriting. To tune a different param,
# change `promptParam` below.
#
# Launch DETACHED (§8) — a multi-run background job. No per-repo input; the repos
# live in `params.dataset`:
#   RUN=$(curl -s -X POST .../gitsee-optimize/run -d '{"input":{}}' | jq -r .runId)
#   curl -N .../gitsee-optimize/runs/$RUN/stream
#
# Input:  {} (the cohort is params.dataset)
# Output: { bestScore (best MEAN across repos), bestGen, bestPrompt, firstScore,
#           totalCost, totalUsage, generations }
#   totalCost/totalUsage — the WHOLE run's dollar cost + token counts: every
#   per-repo eval (the explorer agent + the scorer's LLM judge) plus every
#   reflection. Each `generations[]` entry also carries its own { cost, usage }.
# Promote a winner by writing bestPrompt into gitsee-explore-services' `system`
# param default + publishing a new version.
steps:
  - id: optimize
    type: eval/optimize
    config:
      evalWorkflow: gitsee-eval
      # The dataset: one entry per repo, each carrying its OWN gold (`expected`),
      # which gitsee-eval reads from input. Averaged into the generation score.
      evalInputs: "{{ params.dataset }}"
      targetWorkflow: gitsee-explore-services
      promptParam: system
      reflectWorkflow: gitsee-eval-reflect
      maxGenerations: "{{ params.maxGenerations }}"
      threshold: "{{ params.threshold }}"
      # SERIALIZE the per-workspace evals: each one runs the BOOT GATE
      # (gitsee/verify-setup), which binds fixed host ports (frontend :3000,
      # postgres :5432), a pm2 process named "frontend", and the single staklink
      # daemon — so concurrent boots would collide. 1 = one workspace booted at a
      # time. (Raise only if you isolate ports/names per workspace.)
      concurrency: "{{ params.concurrency }}"

# ── params: the cohort (dataset of WORKSPACES) + the loop's stopping knobs ──
# Each dataset entry is a WORKSPACE: { label, repos: [{ owner, repo, rev? }],
# token?, expected }.
#   label    — the workspace name (clone dir + the "eval: <label>" link).
#   repos    — cloned as siblings under /workspaces/<repo>: the runnable frontend
#              plus any local-dependency repos it builds against. `rev` pins a
#              commit so the gold doesn't drift vs HEAD.
#   expected — the GOLD OUTPUT: the canonical pm2.config.js + docker-compose.yml
#              pair that gets the workspace's FRONTEND running (same "FILENAME: …"
#              format the agent emits; the scorer decomposes it into requirements).
#   token    — optional (clone falls back to the GITHUB_TOKEN env for private repos).
#
# ADD more workspaces (with their own gold pairs) for a stronger multi-example
# optimize — single-example overfits (EVAL_SPEC §11.2).
#
# The cohort (5 workspaces, increasing difficulty): heroku-node (1 repo, plain
# Express, no DB) · hive (4 repos, Next.js+Postgres+Prisma+Stripe, USE_MOCKS) ·
# sphinx-server (1 repo, a Go backend API + postgres) · mikeoss (1 repo,
# frontend+backend + minio + local supabase, port-specific pod URLs) ·
# sphinx-apps (3 mobile repos, no web frontend → dummy hell0-w0rld).
# COST: each entry runs a full agent exploration PER generation, so 5 × maxGens
# clones+explores can get expensive/slow — most repos are private (GITHUB_TOKEN)
# and several are large. Lower maxGenerations or trim the cohort for a quick pass.
params:
  maxGenerations: 4
  threshold: 0.9
  # Serialize the boot gates (one workspace booted at a time) — concurrent boots
  # collide on host ports 3000/5432, the pm2 "frontend" name, and the staklink
  # daemon. A full run is 5 workspaces × maxGenerations boots, in series.
  concurrency: 1
  dataset:
    # Single-repo workspace: a plain Express app, no DB.
    - label: heroku-node
      repos:
        - owner: heroku
          repo: node-js-getting-started
      expected: |-
        FILENAME: pm2.config.js

        ```js
        module.exports = {
          apps: [
            {
              name: "frontend",
              script: "npm start",
              cwd: "/workspaces/node-js-getting-started",
              instances: 1,
              autorestart: true,
              watch: false,
              max_memory_restart: "1G",
              env: {
                PORT: "3000",
                INSTALL_COMMAND: "npm install",
                TEST_COMMAND: "npm test"
              }
            }
          ]
        };
        ```

        FILENAME: docker-compose.yml

        ```yaml
        networks:
          app_network:
            driver: bridge
        ```
    # Real multi-repo workspace (Next.js + Postgres + Prisma). The runnable
    # frontend is `hive`; sphinx-voice / system-canvas / staklink are local-
    # dependency siblings it builds against. Exercises the high-value skills:
    # detecting the frontend among siblings, a required DB service, matching
    # credentials across pm2/compose, the host-binding flag, USE_MOCKS, pod-based
    # public URLs, and a prisma migrate PRE_START_COMMAND. Private repos → clone
    # uses the GITHUB_TOKEN env. NOTE: unpinned (no `rev`), so the gold can drift
    # vs HEAD — pin each repo to the commit the gold was captured from when known.
    - label: hive
      repos:
        - owner: stakwork
          repo: hive
        - owner: stakwork
          repo: sphinx-voice
        - owner: stakwork
          repo: system-canvas
        - owner: stakwork
          repo: staklink
      expected: |-
        FILENAME: pm2.config.js

        ```ts
        module.exports = {
          apps: [
            {
              name: "frontend",
              script: "npm run dev -- -H 0.0.0.0",
              cwd: "/workspaces/hive",
              instances: 1,
              autorestart: true,
              watch: false,
              max_memory_restart: "1G",
              env: {
                DATABASE_URL:
                  "postgresql://hive_user:hive_password@localhost:5432/hive_db",
                NEXTAUTH_URL: "https://$POD_ID.workspaces.sphinx.chat",
                NEXTAUTH_SECRET:
                  "dev-secret-key-change-in-production-12345678901234567890",
                JWT_SECRET:
                  "dev-jwt-secret-change-in-production-1234567890abcdefghijklmnopqrstuvwxyz",
                POD_URL: "$POD_URL",
                TOKEN_ENCRYPTION_KEY:
                  "cb54aa41a75298418586c5443f264338013520b3bad612fce9ac2fc32ed19882",
                TOKEN_ENCRYPTION_KEY_ID: "k2",
                API_TOKEN: "dev-api-token-change-in-production",
                USE_MOCKS: "true",
                GITHUB_CLIENT_ID: "mock-github-client-id",
                GITHUB_CLIENT_SECRET: "mock-github-client-secret",
                GITHUB_APP_SLUG: "mock-github-app",
                STAKWORK_API_KEY: "mock-stakwork-api-key",
                STAKWORK_BASE_URL: "https://mock-jobs.stakwork.com/api/v1",
                STAKWORK_WORKFLOW_ID: "43198,43199,43200",
                ANTHROPIC_API_KEY: "mock-anthropic-api-key",
                NEXT_PUBLIC_SPHINX_TRIBES_URL: "https://community.sphinx.chat",
                STRIPE_CANCEL_URL: "$POD_URL/onboarding?payment=cancelled",
                STRIPE_SUCCESS_URL: "$POD_URL/onboarding?payment=success",
                STRIPE_PRICE_ID: "price_mock-stripe-price-id",
                STRIPE_SECRET_KEY: "sk_test_mock-stripe-secret-key",
                STRIPE_WEBHOOK_SECRET: "whsec_mock-stripe-webhook-secret",
                PORT: "3000",
                INSTALL_COMMAND: "npm install",
                TEST_COMMAND: "npm run test",
                BUILD_COMMAND: "npm run build",
                PRE_START_COMMAND: "npx prisma migrate dev",
                RESET_COMMAND: "npx -y prisma migrate reset -f",
              },
            },
          ],
        };
        ```

        FILENAME: docker-compose.yml

        ```yml
        version: "3.8"
        networks:
          app_network:
            driver: bridge
        services:
          postgres:
            image: postgres:15-alpine
            container_name: hive-postgres-dev
            environment:
              POSTGRES_DB: hive_db
              POSTGRES_USER: hive_user
              POSTGRES_PASSWORD: hive_password
            volumes:
              - postgres_data_dev:/var/lib/postgresql/data
            ports:
              - "5432:5432"
            healthcheck:
              test: ["CMD-SHELL", "pg_isready -U hive_user -d hive_db"]
              interval: 10s
              timeout: 5s
              retries: 5

        volumes:
          postgres_data_dev:
        ```
    # Single-repo Go service (sphinx-meme) — reduced from the ambiguous 4-repo
    # workspace to ONE repo so there's exactly one runnable app (a Go backend API,
    # named "frontend" per the contract — a backend API is a valid frontend) plus
    # its postgres. Exercises a non-Node runtime (`go run .`) and a DATABASE_URL
    # whose creds must match the compose service.
    - label: sphinx-server
      repos:
        - owner: stakwork
          repo: sphinx-meme
      expected: |-
        FILENAME: pm2.config.js

        ```ts
        module.exports = {
          apps: [
            {
              name: "frontend",
              script: "go run .",
              cwd: "/workspaces/sphinx-meme",
              instances: 1,
              autorestart: true,
              watch: false,
              max_memory_restart: "1G",
              env: {
                HOST: "localhost:5001",
                JWT_KEY: "your_secret_jwt_key_change_this_in_production",
                DATABASE_URL:
                  "postgresql://postgres:password@localhost:5432/sphinx_meme?sslmode=disable",
                STORAGE_MODE: "local",
                LOCAL_DIR: "files",
                LOCAL_ENCRYPTION_KEY:
                  "88303a55f5829d9e35936364204bcb007fe330db649902fa1085a7bce3732347",
                MAX_FREE_UPLOAD_SIZE_MB: "32",
                RESTRICT_UPLOAD_SIZE: "false",
                TEST: "test",
                PORT: "5000",
              },
            },
          ],
        };
        ```

        FILENAME: docker-compose.yml

        ```yml
        version: "3.8"
        networks:
          app_network:
            driver: bridge
        volumes:
          postgres_data:
        services:
          postgres:
            image: postgres:15
            container_name: sphinx-meme-postgres
            environment:
              - POSTGRES_DB=sphinx_meme
              - POSTGRES_USER=postgres
              - POSTGRES_PASSWORD=password
            ports:
              - "5432:5432"
            volumes:
              - postgres_data:/var/lib/postgresql/data
              - ./sql/media.sql:/docker-entrypoint-initdb.d/01-media.sql
            networks:
              - app_network
            restart: unless-stopped
            healthcheck:
              test: ["CMD-SHELL", "pg_isready -U postgres"]
              interval: 10s
              timeout: 5s
              retries: 5
        ```
    # Single-repo, frontend+backend in one repo (mikeoss). Exercises: two apps
