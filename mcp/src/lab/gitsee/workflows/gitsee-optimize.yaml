        FILENAME: docker-compose.yml

        ```yml
        version: "3.8"
        networks:
          app_network:
            driver: bridge
        services:
          minio:
            image: minio/minio:latest
            container_name: minio
            command: server /data --console-address ":9001"
            environment:
              - MINIO_ROOT_USER=minioadmin
              - MINIO_ROOT_PASSWORD=minioadmin
            ports:
              - "9000:9000"
              - "9001:9001"
            volumes:
              - minio_data:/data
            networks:
              - app_network
            restart: unless-stopped
        volumes:
          minio_data:
        ```
    # Mobile-only workspace (sphinx-apps): a native iOS/Android/macOS repo with NO
    # runnable web frontend. The correct answer is the DUMMY `hell0-w0rld` frontend
    # (so the pod can still verify it's up) and NO compose services. Trimmed to a
    # single repo to keep clone cost down. Exercises the "no real frontend → dummy"
    # fallback + "add no services".
    - label: sphinx-apps
      repos:
        - owner: stakwork
          repo: sphinx-ios-v2
      expected: |-
        FILENAME: pm2.config.js

        ```ts
        module.exports = {
          apps: [
            {
              name: "frontend",
              script: "npx",
              cwd: "/workspaces/sphinx-ios-v2",
              instances: 1,
              autorestart: true,
              watch: false,
              args: "-y hell0-w0rld",
              max_memory_restart: "1G",
              env: {
                PORT: "3000",
              },
            },
          ],
        };
        ```
